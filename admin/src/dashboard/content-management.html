<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Content Management - MomentumDIY AI</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #191628 0%, #2a1f3d 100%);
            color: #ffffff;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #ef8e81;
        }

        .header h1 {
            color: #ef8e81;
            font-size: 2.5rem;
            font-weight: 700;
        }

        .nav-links {
            display: flex;
            gap: 20px;
        }

        .nav-links a {
            color: #ffffff;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 25px;
            background: rgba(239, 142, 129, 0.1);
            transition: all 0.3s ease;
        }

        .nav-links a:hover {
            background: rgba(239, 142, 129, 0.3);
            transform: translateY(-2px);
        }

        .content-grid {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 30px;
            margin-bottom: 30px;
        }

        .upload-section {
            background: rgba(255, 255, 255, 0.05);
            padding: 30px;
            border-radius: 15px;
            border: 1px solid rgba(239, 142, 129, 0.3);
        }

        .upload-section h2 {
            color: #ef8e81;
            margin-bottom: 20px;
            font-size: 1.5rem;
        }

        .upload-form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .file-upload {
            position: relative;
            display: inline-block;
            cursor: pointer;
            background: rgba(239, 142, 129, 0.1);
            border: 2px dashed #ef8e81;
            border-radius: 10px;
            padding: 40px 20px;
            text-align: center;
            transition: all 0.3s ease;
        }

        .file-upload:hover {
            background: rgba(239, 142, 129, 0.2);
            border-color: #ffffff;
        }

        .file-upload input[type="file"] {
            position: absolute;
            opacity: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }

        .file-upload i {
            font-size: 3rem;
            color: #ef8e81;
            margin-bottom: 10px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .form-group label {
            font-weight: 600;
            color: #ef8e81;
        }

        .form-group input, .form-group select, .form-group textarea {
            padding: 12px;
            border: 1px solid rgba(239, 142, 129, 0.3);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.05);
            color: #ffffff;
            font-family: inherit;
        }

        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            outline: none;
            border-color: #ef8e81;
            box-shadow: 0 0 0 2px rgba(239, 142, 129, 0.2);
        }

        .upload-btn {
            background: linear-gradient(135deg, #ef8e81 0%, #e67e22 100%);
            color: #ffffff;
            border: none;
            padding: 15px 30px;
            border-radius: 25px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .upload-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(239, 142, 129, 0.3);
        }

        .upload-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .content-library {
            background: rgba(255, 255, 255, 0.05);
            padding: 30px;
            border-radius: 15px;
            border: 1px solid rgba(239, 142, 129, 0.3);
        }

        .library-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .library-header h2 {
            color: #ef8e81;
            font-size: 1.5rem;
        }

        .search-bar {
            display: flex;
            gap: 10px;
        }

        .search-bar input {
            padding: 10px 15px;
            border: 1px solid rgba(239, 142, 129, 0.3);
            border-radius: 25px;
            background: rgba(255, 255, 255, 0.05);
            color: #ffffff;
            min-width: 250px;
        }

        .filter-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 8px 16px;
            border: 1px solid rgba(239, 142, 129, 0.3);
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.05);
            color: #ffffff;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .filter-btn.active {
            background: #ef8e81;
            color: #ffffff;
        }

        .content-grid-display {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            max-height: 600px;
            overflow-y: auto;
        }

        .content-item {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            padding: 15px;
            border: 1px solid rgba(239, 142, 129, 0.2);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .content-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
            border-color: #ef8e81;
        }

        .content-preview {
            width: 100%;
            height: 120px;
            background: rgba(239, 142, 129, 0.1);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 10px;
            font-size: 2rem;
            color: #ef8e81;
        }

        .content-info h3 {
            font-size: 0.9rem;
            margin-bottom: 5px;
            color: #ffffff;
        }

        .content-info p {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 5px;
        }

        .content-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin-top: 10px;
        }

        .tag {
            background: rgba(239, 142, 129, 0.2);
            color: #ef8e81;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 0.7rem;
        }

        .stats-section {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 10px;
            border: 1px solid rgba(239, 142, 129, 0.3);
            text-align: center;
        }

        .stat-card h3 {
            color: #ef8e81;
            font-size: 2rem;
            margin-bottom: 5px;
        }

        .stat-card p {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.9rem;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }

        .loading i {
            font-size: 2rem;
            color: #ef8e81;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .alert {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .alert.success {
            background: rgba(46, 204, 113, 0.2);
            border: 1px solid #2ecc71;
            color: #2ecc71;
        }

        .alert.error {
            background: rgba(231, 76, 60, 0.2);
            border: 1px solid #e74c3c;
            color: #e74c3c;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
        }

        .modal-content {
            background: #191628;
            margin: 5% auto;
            padding: 30px;
            border-radius: 15px;
            width: 80%;
            max-width: 600px;
            border: 2px solid #ef8e81;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-header h2 {
            color: #ef8e81;
        }

        .close {
            color: #ef8e81;
            font-size: 2rem;
            cursor: pointer;
        }

        .close:hover {
            color: #ffffff;
        }

        .usage-info {
            background: rgba(239, 142, 129, 0.1);
            padding: 15px;
            border-radius: 8px;
            margin-top: 10px;
        }

        .usage-info h4 {
            color: #ef8e81;
            margin-bottom: 10px;
        }

        .usage-info p {
            font-size: 0.9rem;
            margin-bottom: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-images"></i> Content Management</h1>
            <div class="nav-links">
                <a href="index.html"><i class="fas fa-home"></i> Dashboard</a>
                <a href="agents.html"><i class="fas fa-robot"></i> Agents</a>
                <a href="content-management.html" class="active"><i class="fas fa-images"></i> Content</a>
                <a href="analytics.html"><i class="fas fa-chart-bar"></i> Analytics</a>
                <a href="agent-outputs.html"><i class="fas fa-check-circle"></i> Agent Outputs</a>
            </div>
        </div>

        <div class="alert" id="alert"></div>

        <div class="stats-section">
            <div class="stat-card">
                <h3 id="totalContent">0</h3>
                <p>Total Content</p>
            </div>
            <div class="stat-card">
                <h3 id="imagesCount">0</h3>
                <p>Images</p>
            </div>
            <div class="stat-card">
                <h3 id="videosCount">0</h3>
                <p>Videos</p>
            </div>
            <div class="stat-card">
                <h3 id="usageRate">0%</h3>
                <p>Usage Rate</p>
            </div>
        </div>

        <div class="content-grid">
            <div class="upload-section">
                <h2><i class="fas fa-upload"></i> Upload Content</h2>
                <form class="upload-form" id="uploadForm">
                    <div class="file-upload" onclick="document.getElementById('fileInput').click()">
                        <i class="fas fa-cloud-upload-alt"></i>
                        <p>Click to select file or drag and drop</p>
                        <p style="font-size: 0.8rem; margin-top: 10px;">Supports: Images, Videos, Audio, Documents</p>
                        <input type="file" id="fileInput" accept="image/*,video/*,audio/*,.pdf,.doc,.docx,.txt,.md" style="display: none;">
                    </div>
                    
                    <div class="form-group">
                        <label for="description">Description</label>
                        <textarea id="description" rows="3" placeholder="Describe your content..."></textarea>
                    </div>
                    
                    <div class="form-group">
                        <label for="tags">Tags (comma-separated)</label>
                        <input type="text" id="tags" placeholder="marketing, small-business, brand">
                    </div>
                    
                    <div class="form-group">
                        <label for="category">Category</label>
                        <select id="category">
                            <option value="general">General</option>
                            <option value="brand-assets">Brand Assets</option>
                            <option value="marketing">Marketing</option>
                            <option value="social-media">Social Media</option>
                            <option value="product">Product</option>
                            <option value="behind-scenes">Behind the Scenes</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="brandRelevance">Brand Relevance</label>
                        <select id="brandRelevance">
                            <option value="high">High</option>
                            <option value="medium">Medium</option>
                            <option value="low">Low</option>
                        </select>
                    </div>
                    
                    <button type="submit" class="upload-btn" id="uploadBtn">
                        <i class="fas fa-upload"></i> Upload Content
                    </button>
                </form>
            </div>

            <div class="content-library">
                <div class="library-header">
                    <h2><i class="fas fa-folder-open"></i> Content Library</h2>
                    <div class="search-bar">
                        <input type="text" id="searchInput" placeholder="Search content...">
                        <button class="filter-btn" onclick="searchContent()">
                            <i class="fas fa-search"></i>
                        </button>
                    </div>
                </div>

                <div class="filter-buttons">
                    <button class="filter-btn active" data-filter="all">All</button>
                    <button class="filter-btn" data-filter="images">Images</button>
                    <button class="filter-btn" data-filter="videos">Videos</button>
                    <button class="filter-btn" data-filter="audio">Audio</button>
                    <button class="filter-btn" data-filter="documents">Documents</button>
                </div>

                <div class="loading" id="loading">
                    <i class="fas fa-spinner"></i>
                    <p>Loading content...</p>
                </div>

                <div class="content-grid-display" id="contentGrid">
                    <!-- Content items will be loaded here -->
                </div>
            </div>
        </div>
    </div>

    <!-- Content Detail Modal -->
    <div class="modal" id="contentModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Content Details</h2>
                <span class="close" onclick="closeModal()">&times;</span>
            </div>
            <div id="modalContent">
                <!-- Modal content will be loaded here -->
            </div>
        </div>
    </div>

    <script>
        let currentContent = [];
        let currentFilter = 'all';

        // Initialize page
        document.addEventListener('DOMContentLoaded', function() {
            loadContentStats();
            loadContent();
            setupEventListeners();
        });

        function setupEventListeners() {
            // File upload
            document.getElementById('fileInput').addEventListener('change', handleFileSelect);
            document.getElementById('uploadForm').addEventListener('submit', handleUpload);
            
            // Search
            document.getElementById('searchInput').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    searchContent();
                }
            });
            
            // Filter buttons
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    currentFilter = this.dataset.filter;
                    filterContent();
                });
            });
        }

        function handleFileSelect(event) {
            const file = event.target.files[0];
            if (file) {
                const uploadArea = document.querySelector('.file-upload');
                uploadArea.innerHTML = `
                    <i class="fas fa-file"></i>
                    <p><strong>${file.name}</strong></p>
                    <p style="font-size: 0.8rem;">${(file.size / 1024 / 1024).toFixed(2)} MB</p>
                `;
            }
        }

        async function handleUpload(event) {
            event.preventDefault();
            
            const fileInput = document.getElementById('fileInput');
            const file = fileInput.files[0];
            
            if (!file) {
                showAlert('Please select a file to upload', 'error');
                return;
            }

            const uploadBtn = document.getElementById('uploadBtn');
            uploadBtn.disabled = true;
            uploadBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Uploading...';

            const formData = new FormData();
            formData.append('file', file);
            formData.append('description', document.getElementById('description').value);
            formData.append('tags', document.getElementById('tags').value);
            formData.append('category', document.getElementById('category').value);
            formData.append('brandRelevance', document.getElementById('brandRelevance').value);

            try {
                const response = await fetch('/api/content/upload', {
                    method: 'POST',
                    body: formData
                });

                const result = await response.json();

                if (result.success) {
                    showAlert('Content uploaded successfully!', 'success');
                    resetUploadForm();
                    loadContent();
                    loadContentStats();
                } else {
                    showAlert(result.error || 'Upload failed', 'error');
                }
            } catch (error) {
                showAlert('Upload failed: ' + error.message, 'error');
            } finally {
                uploadBtn.disabled = false;
                uploadBtn.innerHTML = '<i class="fas fa-upload"></i> Upload Content';
            }
        }

        function resetUploadForm() {
            document.getElementById('uploadForm').reset();
            document.querySelector('.file-upload').innerHTML = `
                <i class="fas fa-cloud-upload-alt"></i>
                <p>Click to select file or drag and drop</p>
                <p style="font-size: 0.8rem; margin-top: 10px;">Supports: Images, Videos, Audio, Documents</p>
            `;
        }

        async function loadContent() {
            showLoading(true);
            
            try {
                const response = await fetch('/api/content/');
                const data = await response.json();
                
                currentContent = data.content || [];
                displayContent(currentContent);
            } catch (error) {
                showAlert('Failed to load content: ' + error.message, 'error');
            } finally {
                showLoading(false);
            }
        }

        async function loadContentStats() {
            try {
                const response = await fetch('/api/content/stats/overview');
                const data = await response.json();
                const stats = data.stats;
                
                document.getElementById('totalContent').textContent = stats.total || 0;
                document.getElementById('imagesCount').textContent = stats.byType?.images || 0;
                document.getElementById('videosCount').textContent = stats.byType?.videos || 0;
                
                const usageRate = stats.total > 0 ? ((stats.total - stats.unused) / stats.total * 100).toFixed(1) : 0;
                document.getElementById('usageRate').textContent = usageRate + '%';
            } catch (error) {
                console.error('Failed to load stats:', error);
            }
        }

        function displayContent(content) {
            const grid = document.getElementById('contentGrid');
            grid.innerHTML = '';

            if (content.length === 0) {
                grid.innerHTML = `
                    <div style="grid-column: 1 / -1; text-align: center; padding: 40px; color: rgba(255,255,255,0.7);">
                        <i class="fas fa-folder-open" style="font-size: 3rem; margin-bottom: 20px;"></i>
                        <p>No content found. Upload some content to get started!</p>
                    </div>
                `;
                return;
            }

            content.forEach(item => {
                const contentItem = document.createElement('div');
                contentItem.className = 'content-item';
                contentItem.onclick = () => showContentDetails(item);

                const icon = getContentIcon(item.contentType);
                const tags = item.tags ? item.tags.slice(0, 3) : [];

                contentItem.innerHTML = `
                    <div class="content-preview">
                        <i class="${icon}"></i>
                    </div>
                    <div class="content-info">
                        <h3>${item.originalName}</h3>
                        <p>${item.description || 'No description'}</p>
                        <p style="font-size: 0.7rem; color: #ef8e81;">Used ${item.usageCount || 0} times</p>
                        <div class="content-tags">
                            ${tags.map(tag => `<span class="tag">${tag}</span>`).join('')}
                        </div>
                    </div>
                `;

                grid.appendChild(contentItem);
            });
        }

        function getContentIcon(contentType) {
            const icons = {
                'images': 'fas fa-image',
                'videos': 'fas fa-video',
                'audio': 'fas fa-music',
                'documents': 'fas fa-file-alt'
            };
            return icons[contentType] || 'fas fa-file';
        }

        function filterContent() {
            let filtered = currentContent;
            
            if (currentFilter !== 'all') {
                filtered = currentContent.filter(item => item.contentType === currentFilter);
            }
            
            displayContent(filtered);
        }

        async function searchContent() {
            const query = document.getElementById('searchInput').value.trim();
            
            if (!query) {
                displayContent(currentContent);
                return;
            }

            showLoading(true);
            
            try {
                const response = await fetch(`/api/content/search?q=${encodeURIComponent(query)}`);
                const data = await response.json();
                
                displayContent(data.results || []);
            } catch (error) {
                showAlert('Search failed: ' + error.message, 'error');
            } finally {
                showLoading(false);
            }
        }

        function showContentDetails(content) {
            const modal = document.getElementById('contentModal');
            const modalContent = document.getElementById('modalContent');
            
            const usageInfo = content.lastUsed ? 
                `<p><strong>Last Used:</strong> ${new Date(content.lastUsed).toLocaleDateString()}</p>` : 
                '<p><strong>Last Used:</strong> Never</p>';

            modalContent.innerHTML = `
                <div style="text-align: center; margin-bottom: 20px;">
                    <i class="${getContentIcon(content.contentType)}" style="font-size: 4rem; color: #ef8e81;"></i>
                </div>
                <h3 style="color: #ef8e81; margin-bottom: 15px;">${content.originalName}</h3>
                <p style="margin-bottom: 15px;">${content.description || 'No description provided'}</p>
                
                <div class="usage-info">
                    <h4>Content Information</h4>
                    <p><strong>Type:</strong> ${content.contentType}</p>
                    <p><strong>Size:</strong> ${(content.size / 1024 / 1024).toFixed(2)} MB</p>
                    <p><strong>Category:</strong> ${content.category}</p>
                    <p><strong>Brand Relevance:</strong> ${content.brandRelevance}</p>
                    <p><strong>Uploaded:</strong> ${new Date(content.uploadedAt).toLocaleDateString()}</p>
                    ${usageInfo}
                </div>
                
                <div style="margin-top: 15px;">
                    <h4 style="color: #ef8e81;">Tags</h4>
                    <div class="content-tags">
                        ${content.tags ? content.tags.map(tag => `<span class="tag">${tag}</span>`).join('') : 'No tags'}
                    </div>
                </div>
                
                <div style="margin-top: 20px; display: flex; gap: 10px;">
                    <button onclick="deleteContent('${content.id}')" style="background: #e74c3c; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer;">
                        <i class="fas fa-trash"></i> Delete
                    </button>
                    <button onclick="closeModal()" style="background: #7f8c8d; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer;">
                        Close
                    </button>
                </div>
            `;
            
            modal.style.display = 'block';
        }

        async function deleteContent(contentId) {
            if (!confirm('Are you sure you want to delete this content?')) {
                return;
            }

            try {
                const response = await fetch(`/api/content/${contentId}`, {
                    method: 'DELETE'
                });

                const result = await response.json();

                if (result.success) {
                    showAlert('Content deleted successfully!', 'success');
                    closeModal();
                    loadContent();
                    loadContentStats();
                } else {
                    showAlert(result.error || 'Delete failed', 'error');
                }
            } catch (error) {
                showAlert('Delete failed: ' + error.message, 'error');
            }
        }

        function closeModal() {
            document.getElementById('contentModal').style.display = 'none';
        }

        function showLoading(show) {
            document.getElementById('loading').style.display = show ? 'block' : 'none';
        }

        function showAlert(message, type) {
            const alert = document.getElementById('alert');
            alert.textContent = message;
            alert.className = `alert ${type}`;
            alert.style.display = 'block';
            
            setTimeout(() => {
                alert.style.display = 'none';
            }, 5000);
        }

        // Close modal when clicking outside
        window.onclick = function(event) {
            const modal = document.getElementById('contentModal');
            if (event.target === modal) {
                closeModal();
            }
        }
    </script>
</body>
</html>
